<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: 'Lato', sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
position:relative;

background:url("img/Login\ Page.png") no-repeat center center/cover;
}

/* overlay */
body::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;

z-index:0;
}

/* logo */
.logo{
position:absolute;
top:40px;
right:40px;
z-index:2;
}

.logo img{
width:200px;
height:auto;
}

/* card */
.card{
background:white;
padding:40px;
width:100%;
max-width:350px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
z-index:2;
}

.card h2{
margin-bottom:25px;
font-size:22px;
color:#333;
}

/* labels */
label{
display:block;
font-size:14px;
margin-bottom:5px;
color:#555;
margin-top:15px;
}

/* inputs */
input{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:6px;
font-size:16px; /* FIX mobile zoom */
}

/* button */
button{
margin-top:20px;
width:100%;
padding:14px;
background:#1e88e5;
border:none;
border-radius:6px;
color:white;
font-size:15px;
cursor:pointer;
}

button:hover{
background:#0d6efd;
}

#message{
margin-top:10px;
text-align:center;
font-size:13px;
}

/* MOBILE FIX */
@media (max-width:768px){

body{
flex-direction:column;
}

/* logo center */
.logo{
top:40px;
right:40px;
}

.logo img{
width:130px;
}

/* card */
.card{
padding:25px;
border-radius:10px;
}

/* text */
.card h2{
font-size:20px;
}

label{
font-size:13px;
}

}

</style>

</head>

<body>

<div class="logo">
<img src="img/creativesweb.png">
</div>

<div class="card">

<h2>Reset Password</h2>

<form id="resetForm">

<label><b>New Password</b></label>
<input type="password" id="password" placeholder="Enter new password" required>

<label><b>Confirm Password</b></label>
<input type="password" id="confirmPassword" placeholder="Re-enter your password" required>

<button type="submit">Reset Password</button>

<p id="message"></p>

</form>

</div>

<script>

document.getElementById("resetForm").addEventListener("submit", async function(e){

    e.preventDefault();

    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;
    const message = document.getElementById("message");
    const button = document.querySelector("button");

    // ===== GET TOKEN =====
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");

    // ===== VALIDATION =====
    if(!token){
        message.innerText = "Invalid or missing token";
        message.style.color = "red";
        return;
    }

    if(password.length < 8){
        message.innerText = "Password must be at least 8 characters";
        message.style.color = "red";
        return;
    }

    if(password !== confirmPassword){
        message.innerText = "Passwords do not match";
        message.style.color = "red";
        return;
    }

    // ===== LOADING =====
    button.disabled = true;
    button.innerText = "Resetting...";

    try {

        const response = await fetch("http://localhost:8080/api/reset-password", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                token: token,
                newPassword: password,
                confirmPassword: confirmPassword
            })
        });

        const result = await response.json();

        if(result.success){
            message.innerText = result.message || "Password reset successful";
            message.style.color = "green";

            // redirect after success
            setTimeout(() => {
                window.location.href = "login.html";
            }, 1000);

        } else {
            message.innerText = result.message || "Failed to reset password";
            message.style.color = "red";
        }

    } catch(error){
        console.error(error);
        message.innerText = "Server error. Try again later.";
        message.style.color = "red";
    }

    // ===== RESET BUTTON =====
    button.disabled = false;
    button.innerText = "Reset Password";

});

</script>

</body>
</html>
