<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forgot Password</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

/* BACKGROUND */
body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;

background:
linear-gradient(rgba(10,37,64,0.4),
rgba(10,37,64,0.4)),
url("img/Login Page.png");

background-size:cover;
background-position:center;
}

/* LOGO */
.logo{
position:absolute;
top:30px;
right:40px;
}

.logo img{
width:180px;
}

/* CARD */
.forgot-card{
width:380px;
background:#fff;
padding:30px;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,0.25);

animation:fadeIn 0.7s ease;
}

@keyframes fadeIn{
0%{opacity:0; transform:translateY(40px);}
100%{opacity:1; transform:translateY(0);}
}

/* TITLE */
.title{
font-size:22px;
font-weight:600;
margin-bottom:20px;
color:#000;
}

/* LABEL */
label{
font-size:13px;
font-weight:500;
display:block;
margin-bottom:6px;
}

/* INPUT */
.form-control{
width:100%;
padding:10px 12px;
border:1px solid #ddd;
border-radius:6px;
background:#f5f6f8;
margin-bottom:18px;
}

.form-control:focus{
outline:none;
border:1px solid #1e88e5;
background:#fff;
}

/* BUTTON */
.btn{
width:100%;
padding:11px;
background:#1e88e5;
border:none;
border-radius:6px;
color:#fff;
font-weight:600;
cursor:pointer;
}

.btn:hover{
background:#1565c0;
}

/* LINK */
.bottom-text{
text-align:center;
margin-top:15px;
font-size:13px;
}

.bottom-text a{
color:#1e88e5;
font-weight:600;
text-decoration:none;
border-bottom:2px solid #1e88e5;   /* underline */
padding-bottom:2px;
transition:0.3s;
}

.bottom-text a:hover{
color:#1565c0;
border-bottom:2px solid #1565c0;
}

/* MOBILE */
@media(max-width:768px){

body{
padding:15px;
align-items:flex-start;
}

.forgot-card{
width:100%;
max-width:350px;
padding:20px;
margin-top:80px;
}

.logo{
top:15px;
right:15px;
}

.logo img{
width:120px;
}

}

</style>

</head>

<body>

<!-- LOGO -->
<div class="logo">
<img src="img/creativesweb.png">
</div>

<!-- CARD -->
<div class="forgot-card">

<h2 class="title">Forgot Password</h2>

<form id="forgotForm">

<label>Email</label>
<input type="email" id="email" class="form-control" placeholder="Enter email">

<button class="btn">Send Email</button>

<div class="bottom-text">
Remember password?
<a href="login.html">Back to Login</a>
</div>

</form>

</div>

<script>

document.getElementById("forgotForm").addEventListener("submit", async function(e){

    e.preventDefault();

    const email = document.getElementById("email").value.trim();
    const button = document.querySelector(".btn");

    const pattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    // ===== VALIDATION =====
    if(email === ""){
        alert("Please enter email");
        return;
    }

    if(!pattern.test(email)){
        alert("Enter valid email");
        return;
    }

    // ===== LOADING =====
    button.disabled = true;
    button.innerText = "Sending...";

    try {

        const response = await fetch("http://localhost:8080/api/forgot-password", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ email })
        });

        const result = await response.json();

        // ===== SUCCESS =====
        if(result.success){
            // redirect to check email page with email
            window.location.href = "check_your_email.html?email=" + encodeURIComponent(email);
        } 
        // ===== FAILURE =====
        else {
            alert(result.message || "Something went wrong");
        }

    } catch (error) {
        console.error(error);
        alert("Server error. Try again later.");
    }

    // ===== RESET BUTTON =====
    button.disabled = false;
    button.innerText = "Send Email";

});

</script>



</body>
</html>
